x-shared-env: &shared-env
  OLLAMA_MODEL: 
  OLLAMA_BASE_URL: 
  SECRET_KEY: 
  SENTRY_DSN: http://ac68cc0ad8f54496961aec4e3d48d227@glitchtip:8000/1
  ENVIRONMENT: production

services:
  # --- BACKEND (Flask) ---
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: backend
    container_name: assetflow_backend
    command: sh -c "alembic upgrade head && gunicorn --bind 0.0.0.0:5328 --workers 1 --threads 4 --timeout 120 backend:app"
    restart: always
    ports:
      - "5328:5328"
    volumes:
      - sqlite_data:/app/data
      - ./backups:/app/backups
    environment:
      <<: *shared-env
      FLASK_DEBUG: 0
      ALLOWED_ORIGINS: 
      APP_RELEASE: 
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5328/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 2g
    cpus: 2.0

  # --- WORKER (APScheduler) ---
  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: worker
    container_name: assetflow_worker
    restart: always
    volumes:
      - sqlite_data:/app/data
      - ./backups:/app/backups
    environment:
      <<: *shared-env
      PYTHONPATH: /app
      WORKER_HEARTBEAT_PATH: /app/data/worker_heartbeat.txt
      APP_RELEASE: 
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import os, time; p='/app/data/worker_heartbeat.txt'; ok=os.path.exists(p) and (time.time()-os.path.getmtime(p))<120; exit(0 if ok else 1)\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 1.5g
    cpus: 1.5

  # --- FRONTEND (Next.js Standalone) ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assetflow_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_SENTRY_DSN=
      - SENTRY_DSN=http://ac68cc0ad8f54496961aec4e3d48d227@glitchtip:8000/1
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    mem_limit: 1g
    cpus: 1.0

  # --- OLLAMA ---
  ollama:
    image: ollama/ollama:latest
    container_name: assetflow_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 10s

volumes:
  sqlite_data:
  ollama_data:
