# docker-compose.prod.yml
# Otimizado para Oracle Always-Free Ampere A1: 2 vCPU / 12 GB RAM
# CPU total (burst): ≤ 4.0 | RAM total: ≤ 6.75 GB (sobram ~5 GB p/ SO/cache)

x-shared-env: &shared-env
  SENTRY_DSN: ""
  ENVIRONMENT: production
  APP_RELEASE: ${APP_RELEASE:-latest}

services:
  # ------------------------------------------------------------------
  # CADDY — Proxy reverso + TLS automático via Let's Encrypt
  # ------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: assetflow_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - assetflow

  # ------------------------------------------------------------------
  # BACKEND — Flask / Gunicorn
  # ------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: backend
    container_name: assetflow_backend
    command: sh -c "alembic upgrade head && gunicorn --bind 0.0.0.0:5328 -k gthread --workers 2 --threads 8 --timeout 300 --graceful-timeout 30 backend:app"
    restart: always
    expose:
      - "5328"
    volumes:
      - sqlite_data:/app/data
      - ./backups:/app/backups
    env_file:
      - path: .env.production
        required: false
      - path: .env.production.local
        required: false
    environment:
      <<: *shared-env
      FLASK_DEBUG: "0"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://assetflowpro.duckdns.org}
      LOCKS_DIR: /app/data/locks
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5328/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
    networks:
      - assetflow

  # ------------------------------------------------------------------
  # WORKER — APScheduler
  # ------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: worker
    container_name: assetflow_worker
    restart: always
    volumes:
      - sqlite_data:/app/data
      - ./backups:/app/backups
    env_file:
      - path: .env.production
        required: false
      - path: .env.production.local
        required: false
    environment:
      <<: *shared-env
      PYTHONPATH: /app
      WORKER_HEARTBEAT_PATH: /app/data/worker_heartbeat.txt
      LOCKS_DIR: /app/data/locks
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: >
        ["CMD-SHELL",
         "python -c \"import os,time; p='/app/data/worker_heartbeat.txt'; ok=os.path.exists(p) and (time.time()-os.path.getmtime(p))<120; exit(0 if ok else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M
    networks:
      - assetflow

  # ------------------------------------------------------------------
  # FRONTEND — Next.js Standalone
  # ------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assetflow_frontend
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--max-old-space-size=2048
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_BACKEND_URL=
      - SENTRY_DSN=
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    networks:
      - assetflow

networks:
  assetflow:
    driver: bridge

volumes:
  sqlite_data:
  backups:
  caddy_data:
  caddy_config:
