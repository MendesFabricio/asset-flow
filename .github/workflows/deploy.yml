name: Deploy to Oracle VPS

# Roda APENAS em push direto para main (não em feature branches)
on:
  push:
    branches: ["main"]
  workflow_dispatch:  # permite trigger manual pelo GitHub UI

jobs:
  # ------------------------------------------------------------------
  # O CI (ci.yml) roda separado. Este job verifica os secrets e
  # só conecta na VM se tudo estiver configurado.
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to Oracle Always-Free VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Valida se os secrets obrigatórios estão configurados antes de tentar SSH
      - name: Verify required secrets
        env:
          SECRET_HOST: ${{ secrets.VM_HOST }}
          SECRET_USER: ${{ secrets.VM_USER }}
          SECRET_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO: ${{ github.repository }}
        run: |
          missing=0
          if [ -z "$SECRET_HOST" ]; then
            echo "❌ Secret VM_HOST não configurado no repositório."
            missing=1
          fi
          if [ -z "$SECRET_USER" ]; then
            echo "❌ Secret VM_USER não configurado no repositório."
            missing=1
          fi
          if [ -z "$SECRET_KEY" ]; then
            echo "❌ Secret SSH_PRIVATE_KEY não configurado no repositório."
            missing=1
          fi
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ Secret GEMINI_API_KEY não configurado no repositório."
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "📋 Para configurar, acesse:"
            echo "   https://github.com/$REPO/settings/secrets/actions"
            echo ""
            echo "   VM_HOST    → IP público da VPS (ex: 163.176.221.126)"
            echo "   VM_USER    → usuário SSH (ex: ubuntu)"
            echo "   SSH_PRIVATE_KEY → chave privada SSH (conteúdo do arquivo ~/.ssh/id_rsa)"
            echo "   GEMINI_API_KEY → chave de API do Google Gemini AI"
            exit 1
          fi
          echo "✅ Todos os secrets estão configurados."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 300s
          envs: GEMINI_API_KEY
          script: |
            set -e
            echo "🚀 Iniciando deploy em $(hostname) - $(date)"

            if [ ! -d /opt/assetflow ]; then
              echo "❌ Diretório /opt/assetflow não encontrado. Execute o setup inicial primeiro."
              exit 1
            fi

            cd /opt/assetflow

            echo "📥 Pulling latest changes (main)..."
            git fetch origin main
            git reset --hard origin/main

            # Auto-generate secret key if not exists in local env
            if [ ! -f .env.production.local ] || ! grep -q "SECRET_KEY=" .env.production.local; then
              echo "SECRET_KEY=$(openssl rand -hex 32)" >> .env.production.local
            fi

            # Marca a versão no .env.production.local
            export APP_RELEASE=$(git rev-parse --short HEAD)
            sed -i '/^APP_RELEASE=/d' .env.production.local 2>/dev/null || true
            sed -i '/^GEMINI_API_KEY=/d' .env.production.local 2>/dev/null || true
            
            echo "APP_RELEASE=$APP_RELEASE" >> .env.production.local
            echo "GEMINI_API_KEY=\"$GEMINI_API_KEY\"" >> .env.production.local

            echo "🐳 Rebuilding and restarting containers..."
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --build

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "⏳ Waiting 20s for services to stabilize..."
            sleep 20

            echo "🏥 Health check..."
            curl -sf http://localhost/api/health && echo "✅ Backend healthy" || echo "⚠️ Backend still starting, check logs."

            echo "🎉 Deploy finalizado! Release: $APP_RELEASE"
