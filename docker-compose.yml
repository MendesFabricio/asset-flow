services:
  # --- BACKEND (Python / Flask) ---
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: backend
    container_name: assetflow_backend
    restart: always
    ports:
      - "5328:5328"
    volumes:
      - ./server:/app/server
      - sqlite_data:/app/data
      - ./backups:/app/backups
      - ./database:/app/database
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - OLLAMA_MODEL=llama3.2:3b

    # 🔒 LIMITES
    mem_limit: 2g
    cpus: 1.0
    tmpfs:
      - /tmp:size=128m

  # --- WORKER (Python / APScheduler) ---
  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: worker
    container_name: assetflow_worker
    restart: always
    volumes:
      - ./server:/app/server
      - sqlite_data:/app/data
      - ./backups:/app/backups
      - ./database:/app/database
    environment:
      - PYTHONPATH=/app
      - OLLAMA_MODEL=llama3.2:3b
    depends_on:
      - backend

    # 🔒 LIMITES
    mem_limit: 1.5g
    cpus: 0.8

  # --- FRONTEND (Next.js) ---
  frontend:
    build: .
    container_name: assetflow_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=""
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm start
    depends_on:
      - backend

    # 🔒 LIMITES
    mem_limit: 1.5g
    cpus: 1.0
    tmpfs:
      - /tmp:size=128m

  ollama:
    image: ollama/ollama:latest
    container_name: assetflow_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    mem_limit: 6g
    cpus: 4.0

volumes:
  sqlite_data:
  ollama_data:
