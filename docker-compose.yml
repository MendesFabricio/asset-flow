services:
  # --- BACKEND (Python / Flask) ---
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: assetflow_backend
    restart: always
    ports:
      - "5328:5328"
    volumes:
      - ./server:/app/server
      - sqlite_data:/app/data
      - ./backups:/app/backups
      - ./database:/app/database_init
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=0
      - OLLAMA_MODEL=llama3.2:3b

    # 🔒 LIMITES
    mem_limit: 2g
    cpus: 1.0
    tmpfs:
      - /tmp:size=128m

  # --- FRONTEND (Next.js) ---
  frontend:
    build: .
    container_name: assetflow_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5328
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend

    # 🔒 LIMITES
    mem_limit: 1.5g
    cpus: 1.0
    tmpfs:
      - /tmp:size=128m

  ollama:
    image: ollama/ollama:latest
    container_name: assetflow_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  sqlite_data:
  ollama_data:
