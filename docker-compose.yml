services:
  # --- BACKEND (Python / Flask) ---
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: backend
    container_name: assetflow_backend
    restart: always
    ports:
      - "5328:5328"
    volumes:
      - ./server:/app/server
      - sqlite_data:/app/data
      - ./backups:/app/backups
      - ./database:/app/database
    environment:
      - FLASK_DEBUG=0
      - OLLAMA_MODEL=llama3.2:3b
      - OLLAMA_BASE_URL=http://ollama:11434
      - SECRET_KEY=9e827103a85b9b71a2e3cd8f110a174f8c9b2d35eb7b3d9f1025a1bfe1f8d4bc
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5328/api/health')\" > /dev/null 2>&1 || (echo 'Backend healthcheck failed!' && exit 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    # 🔒 LIMITES
    mem_limit: 2g
    cpus: 1.0
    tmpfs:
      - /tmp:size=128m

  # --- WORKER (Python / APScheduler) ---
  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: worker
    container_name: assetflow_worker
    restart: always
    volumes:
      - ./server:/app/server
      - sqlite_data:/app/data
      - ./backups:/app/backups
      - ./database:/app/database
    environment:
      - PYTHONPATH=/app
      - OLLAMA_MODEL=llama3.2:3b
      - OLLAMA_BASE_URL=http://ollama:11434
      - SECRET_KEY=9e827103a85b9b71a2e3cd8f110a174f8c9b2d35eb7b3d9f1025a1bfe1f8d4bc
    depends_on:
      - backend

    # 🔒 LIMITES
    mem_limit: 1.5g
    cpus: 0.8

  # --- FRONTEND (Next.js) ---
  frontend:
    build: .
    container_name: assetflow_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=""
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (res) => res.statusCode === 200 ? process.exit(0) : process.exit(1))\" > /dev/null 2>&1 || (echo 'Frontend healthcheck failed!' && exit 1)"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - backend

    # 🔒 LIMITES
    mem_limit: 1.5g
    cpus: 1.0
    tmpfs:
      - /tmp:size=128m

  ollama:
    image: ollama/ollama:latest
    container_name: assetflow_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # NOTA: Descomente o bloco 'deploy' acima apenas se possuir GPU NVIDIA e os drivers do NVIDIA Container Toolkit instalados.
    # Para placas de vídeo AMD no Windows, recomendamos rodar o Ollama nativamente no Windows host
    # e alterar OLLAMA_BASE_URL nos serviços backend e worker para http://host.docker.internal:11434.
    mem_limit: 6g
    cpus: 4.0

volumes:
  sqlite_data:
  ollama_data:
