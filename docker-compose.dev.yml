x-shared-env: &shared-env
  OLLAMA_MODEL:
  OLLAMA_BASE_URL:
  SECRET_KEY:
  SENTRY_DSN: http://ac68cc0ad8f54496961aec4e3d48d227@glitchtip:8000/1
  ENVIRONMENT: development

services:
  # --- BACKEND DEV (Flask) ---
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: backend
    container_name: assetflow_backend_dev
    command: sh -c "alembic upgrade head && flask --app backend run --host=0.0.0.0 --port=5328 --debug"
    restart: unless-stopped
    ports:
      - "5328:5328"
    volumes:
      - ./server:/app/server
      - sqlite_data:/app/data
      - ./backups:/app/backups
    environment:
      <<: *shared-env
      PYTHONPATH: /app
      FLASK_DEBUG: 1
      ALLOWED_ORIGINS:
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5328/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- WORKER DEV (APScheduler) ---
  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: worker
    container_name: assetflow_worker_dev
    restart: unless-stopped
    command: sh -c "cd /app/server/worker && python worker.py"
    volumes:
      - ./server:/app/server
      - sqlite_data:/app/data
      - ./backups:/app/backups
    environment:
      <<: *shared-env
      PYTHONPATH: /app:/app/server
      FLASK_DEBUG: 1
      WORKER_HEARTBEAT_PATH: /app/data/worker_heartbeat.txt
    depends_on:
      backend:
        condition: service_healthy

  # --- FRONTEND DEV (Next.js) ---
  frontend:
    image: node:20-alpine
    container_name: assetflow_frontend_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_SENTRY_DSN=
      - SENTRY_DSN=http://ac68cc0ad8f54496961aec4e3d48d227@glitchtip:8000/1
      - ENVIRONMENT=development

  # --- OLLAMA (Opcional no Dev, mantido por consistencia) ---
  ollama:
    image: ollama/ollama:latest
    container_name: assetflow_ollama_dev
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=2

  # --- NGROK (Expose frontend) ---
  ngrok:
    image: ngrok/ngrok:latest
    container_name: assetflow_ngrok_dev
    restart: unless-stopped
    command: [ "http", "frontend:3000", "--url=" ]
    environment:
      - NGROK_AUTHTOKEN=
    depends_on:
      - frontend

volumes:
  sqlite_data:
  ollama_data:
  node_modules:
